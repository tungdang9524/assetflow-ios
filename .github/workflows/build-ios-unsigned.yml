name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate iOS project
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Find workspace and scheme
        id: vars
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" | head -n 1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)

          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT

          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"

      - name: Build unsigned archive
        run: |
          xcodebuild archive \
            -workspace "${{ steps.vars.outputs.workspace }}" \
            -scheme "${{ steps.vars.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/App.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create unsigned IPA
        run: |
          mkdir -p Payload
          cp -R "build/App.xcarchive/Products/Applications/${{ steps.vars.outputs.scheme }}.app" Payload/
          zip -r unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ios-ipa
          path: unsigned.ipa