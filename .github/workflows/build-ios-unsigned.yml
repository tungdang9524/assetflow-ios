name: Build Unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate iOS native project
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: List Xcode schemes
        run: xcodebuild -list -workspace ios/AssetFlow.xcworkspace

      - name: Build unsigned archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace ios/AssetFlow.xcworkspace \
            -scheme AssetFlow \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/AssetFlow.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | tee xcodebuild.log

      - name: Show Xcode errors
        if: failure()
        run: |
          grep -n "error:" xcodebuild.log || true

      - name: Create unsigned IPA
        if: success()
        run: |
          mkdir -p Payload
          cp -R build/AssetFlow.xcarchive/Products/Applications/*.app Payload/
          zip -r AssetFlow-unsigned.ipa Payload

      - name: Upload unsigned IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AssetFlow-unsigned-ipa
          path: AssetFlow-unsigned.ipa