name: EAS iOS Build

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile from eas.json"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - internal
          - production

permissions:
  contents: read

jobs:
  eas-ios-build:
    name: Build iOS artifact with EAS
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Required setup before using this workflow:
      # 1. Create an Expo account and install the EAS CLI locally.
      # 2. Run `npx eas login`, then `npx eas init` in this repo to link an EAS project.
      # 3. Create an Expo access token and save it in GitHub repository secrets as EXPO_TOKEN.
      # 4. Configure iOS credentials in EAS. Internal/device builds usually require
      #    Apple Developer credentials and registered devices for valid signing.
      # 5. Sideloadly/AltStore can install or re-sign an IPA, but this workflow
      #    does not bypass Apple's signing requirements.
      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: Verify Expo authentication
        shell: bash
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::Missing EXPO_TOKEN repository secret. Create an Expo access token and save it as EXPO_TOKEN."
            exit 1
          fi
          eas whoami

      - name: Resolve build profile
        id: profile
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.profile }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=internal" >> "$GITHUB_OUTPUT"
          fi

      - name: Start EAS iOS build and wait for artifact
        run: eas build --platform ios --profile "${{ steps.profile.outputs.name }}" --non-interactive --wait --json > eas-build.json

      - name: Extract iOS artifact download URL
        id: artifact
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const payload = JSON.parse(fs.readFileSync('eas-build.json', 'utf8'));
          const build = Array.isArray(payload) ? payload[0] : payload;
          const url =
            build?.artifacts?.buildUrl ||
            build?.artifacts?.applicationArchiveUrl ||
            build?.artifactUrl;

          if (!url) {
            console.error('No iOS artifact URL found in EAS build output.');
            process.exit(1);
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `url=${url}\n`);
          NODE

      - name: Resolve artifact filename
        id: filename
        shell: bash
        run: |
          if [ "${{ steps.profile.outputs.name }}" = "preview" ]; then
            echo "name=AssetFlow-preview-ios-simulator-artifact.tar.gz" >> "$GITHUB_OUTPUT"
            echo "artifact_name=AssetFlow-preview-ios-simulator-artifact" >> "$GITHUB_OUTPUT"
          else
            echo "name=AssetFlow-${{ steps.profile.outputs.name }}.ipa" >> "$GITHUB_OUTPUT"
            echo "artifact_name=AssetFlow-${{ steps.profile.outputs.name }}-ipa" >> "$GITHUB_OUTPUT"
          fi

      - name: Download iOS artifact
        shell: bash
        run: |
          mkdir -p artifacts
          curl --fail --location "${{ steps.artifact.outputs.url }}" --output "artifacts/${{ steps.filename.outputs.name }}"

      - name: Upload iOS artifact to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.filename.outputs.artifact_name }}
          path: artifacts/*
          if-no-files-found: error
